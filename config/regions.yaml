# Hyperbolic Herbarium — Regional Bundle Definitions
# DECISION-4: Using state-line bounding boxes for prototype.
# Bounding boxes from SPEC §5.4. Switch to EPA Level III Ecoregion polygons
# when data density analysis is available.

regions:
  california:
    display_name: "California"
    bbox:
      lat_min: 32.5
      lat_max: 42.0
      lon_min: -124.5
      lon_max: -114.1
    primary_sources:
      - naflora1m
      - cch2            # training only — see DECISION-5
    approx_specimens: 350000
    approx_taxa: 6500
    symbiota_portal: "https://cch2.org/portal/"
    dwca_path: "data/raw/symbiota/cch2/"

  pacific_northwest:
